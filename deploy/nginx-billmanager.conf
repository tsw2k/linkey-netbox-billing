# Reverse-proxy с TLS перед webhook-приёмником.
# Скопировать в /etc/nginx/sites-available/, заменить webhook.example.com и
# подставить IP NetBox / BillManager в allow-список.
#
# Приёмник слушает 127.0.0.1:8080 (в .env задайте WEBHOOK_HOST=127.0.0.1),
# наружу торчит только nginx с TLS.

upstream billmanager_webhook {
    server 127.0.0.1:8080;
}

# HTTP -> HTTPS
server {
    listen 80;
    server_name webhook.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name webhook.example.com;

    # TLS-сертификат. Проще всего получить через certbot (Let's Encrypt):
    #   certbot --nginx -d webhook.example.com
    ssl_certificate     /etc/letsencrypt/live/webhook.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webhook.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Логи
    access_log /var/log/nginx/billmanager-webhook.access.log;
    error_log  /var/log/nginx/billmanager-webhook.error.log;

    # Принимаем только webhook'и; всё остальное — 404.
    location /webhook/ {
        # --- Ограничение по источнику: только NetBox и BillManager ---
        # Раскомментируйте и впишите реальные адреса.
        # allow 10.0.0.10;     # NetBox
        # allow 10.0.0.20;     # BillManager
        # deny  all;

        proxy_pass http://billmanager_webhook;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Заголовок подписи NetBox пробрасывается как есть; тело не модифицируется,
        # поэтому HMAC-проверка в приложении остаётся валидной.

        proxy_read_timeout 60s;
    }

    # Health-check (можно ограничить или закрыть)
    location = /healthz {
        proxy_pass http://billmanager_webhook;
    }

    location / {
        return 404;
    }
}
